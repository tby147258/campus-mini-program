server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ab7f2f522096da54d08e5015b2cc17f2219954228f649fde3e911ad6be67f606
  expiration: 86400  # 24小时

# 和风天气API
weather:
  api-key: your_heweather_api_key
  cache-minutes: 30

# 文件上传
file:
  upload-path: ./uploads
  allow-types: jpg,jpeg,png