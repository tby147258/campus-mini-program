server:
  port: 8080

spring:
  datasource:
    # 生产环境请通过环境变量 MYSQL_USER / MYSQL_PASSWORD 注入
    # 默认值仅用于本地开发，切勿在生产环境使用 root + 弱密码
    url: jdbc:mysql://localhost:3306/campus?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5     # 开发环境 2~5 足够，生产环境根据并发调整
      maximum-pool-size: 50

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

  # Redis配置 — 生产环境必须设置密码并通过 REDIS_PASSWORD 环境变量注入
  data:
    redis:
      host: 127.0.0.1     # 使用 IP 而非 localhost，避免 Windows 下 IPv6 解析歧义
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 5s          # ISO-8601 Duration 格式（原 5000ms 亦可用，统一为 5s）
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.entity
  type-enums-package: com.campus.enums
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置 — 密钥通过环境变量 JWT_SECRET 注入，生产环境必须覆盖
# 警告：仓库中的默认密钥仅用于本地开发，生产环境请在部署平台设置 JWT_SECRET 环境变量
# 密钥长度至少 32 字节（256 bits），满足 HS256 算法要求
jwt:
  secret: ${JWT_SECRET:ab7f2f522096da54d08e5015b2cc17f2219954228f649fde3e911ad6be67f606}
  expiration: 86400  # 24小时

# 和风天气API — 请先到 https://console.qweather.com 创建项目获取 API Key
# 生产环境通过环境变量 QWEATHER_KEY 注入，避免明文提交到仓库
qweather:
  key: ${QWEATHER_KEY:547f34e99b14494c8fa359d83688cf13}
  # 免费订阅: https://devapi.qweather.com
  # 付费订阅: https://api.qweather.com
  host: ${QWEATHER_HOST:https://m773jt3nbd.re.qweatherapi.com}
  # 城市搜索使用独立 Host
  geo-host: ${QWEATHER_GEO_HOST:https://geoapi.qweather.com}
  api:
    weather-now: /v7/weather/now
    weather-3d: /v7/weather/3d
    city-lookup: /v2/city/lookup

# 文件上传
file:
  upload-path: ./uploads
  allow-types: jpg,jpeg,png